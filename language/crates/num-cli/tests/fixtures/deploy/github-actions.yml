# Generated by num deploy for billing 1.2.3.
# Copy this file to .github/workflows/num-deploy.yml and ensure the num CLI is on PATH.
# Store registry credentials and external secrets in GitHub Actions secrets;
# map [deployment].credentials_ref without committing credential values.
name: Num Deploy Checks

on:
  pull_request:
  workflow_dispatch:

env:
  NUM_PROJECT_DIR: "."
  NUM_DEPLOY_DIR: "dist/num-deploy"
  NUM_COST_REPORT: "num-cost-report.json"
  NUM_DEPLOY_CHECK: "num-deploy-check.json"
  NUM_DEPLOY_PLAN: "num-deploy.json"

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Policy gate
        run: |
          num check "$NUM_PROJECT_DIR"
          num test "$NUM_PROJECT_DIR"

      - name: Cost gate
        run: num cost-report "$NUM_PROJECT_DIR" --json > "$NUM_COST_REPORT"

      - name: Security gate
        run: num lint "$NUM_PROJECT_DIR"

      - name: Deploy check
        run: num deploy "$NUM_PROJECT_DIR" --check --json > "$NUM_DEPLOY_CHECK"

      - name: Package deploy artifact
        run: num deploy "$NUM_PROJECT_DIR" --apply --replace --dir "$NUM_DEPLOY_DIR" --json > "$NUM_DEPLOY_PLAN"

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: num-deploy-check
          path: |
            ${{ env.NUM_COST_REPORT }}
            ${{ env.NUM_DEPLOY_CHECK }}
            ${{ env.NUM_DEPLOY_PLAN }}
            ${{ env.NUM_DEPLOY_DIR }}/
