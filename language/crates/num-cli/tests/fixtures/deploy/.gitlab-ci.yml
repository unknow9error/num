# Generated by num deploy for billing 1.2.3.
# Required GitLab runner runtime: num CLI on PATH and repository checkout access.
# Required variables: NUM_PROJECT_DIR and NUM_DEPLOY_DIR.
# Secret values stay in GitLab CI/CD masked variables or an external secret store;
# map [deployment].credentials_ref to NUM_REGISTRY_CREDENTIALS_ID without storing
# the underlying credential value in this file.
stages:
  - policy
  - cost
  - security
  - package

variables:
  NUM_PROJECT_DIR: "."
  NUM_DEPLOY_DIR: "dist/num-deploy"
  NUM_COST_REPORT: "num-cost-report.json"
  NUM_DEPLOY_CHECK: "num-deploy-check.json"
  NUM_DEPLOY_PLAN: "num-deploy.json"
  NUM_CACHE_DIR: ".num-cache"

cache:
  key: "$CI_COMMIT_REF_SLUG-num"
  paths:
    - .num-cache/
    - dist/num-deploy/

num:policy:
  stage: policy
  script:
    - num check "$NUM_PROJECT_DIR"
    - num test "$NUM_PROJECT_DIR"

num:cost:
  stage: cost
  script:
    - num cost-report "$NUM_PROJECT_DIR" --json > "$NUM_COST_REPORT"
  artifacts:
    when: always
    paths:
      - "$NUM_COST_REPORT"

num:security:
  stage: security
  script:
    - num lint "$NUM_PROJECT_DIR"

num:package:
  stage: package
  script:
    - num deploy "$NUM_PROJECT_DIR" --check --json > "$NUM_DEPLOY_CHECK"
    - num deploy "$NUM_PROJECT_DIR" --apply --replace --dir "$NUM_DEPLOY_DIR" --json > "$NUM_DEPLOY_PLAN"
  artifacts:
    when: always
    paths:
      - "$NUM_DEPLOY_CHECK"
      - "$NUM_DEPLOY_PLAN"
      - "$NUM_DEPLOY_DIR/"
