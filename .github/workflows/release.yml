name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Test Rust workspace
        run: cargo test

      - name: Compile VS Code extension
        run: |
          npm --prefix vscode-extension ci
          npm --prefix vscode-extension run compile

  package:
    name: Package ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-14
            label: macos-arm64
          - os: windows-latest
            label: windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Package
        shell: bash
        run: bash scripts/package-current-platform.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: num-${{ matrix.label }}
          path: |
            dist/releases/num-*.tar.gz
            dist/releases/num-*.zip

  github-release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          awk -v version="$tag" '
            $0 ~ "^## " version "([[:space:]-]|$)" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            {
              echo "num ${GITHUB_REF_NAME}"
              echo
              echo "See CHANGELOG.md for the current release history."
            } > RELEASE_NOTES.md
          fi

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/**/*.tar.gz artifacts/**/*.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
