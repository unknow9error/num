name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-13
            label: macos-x64
          - os: macos-14
            label: macos-arm64
          - os: windows-latest
            label: windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Test
        shell: bash
        run: cargo test

      - name: Package
        shell: bash
        run: bash scripts/package-current-platform.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: num-${{ matrix.label }}
          path: dist/releases/num-*

  github-release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/**/num-* \
            --title "${GITHUB_REF_NAME}" \
            --notes "num CLI and VS Code extension release."
